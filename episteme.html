<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Episteme</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a2035;color:#f0f3fc;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3d5080;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fu{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
.fi{animation:fadeIn .25s ease both}

#header{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;border-bottom:1px solid #3d5080;position:sticky;top:0;z-index:100;background:rgba(26,32,53,.96);backdrop-filter:blur(16px)}
#logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#c9a55a;letter-spacing:-.5px}
#logo span{font-family:'Outfit',sans-serif;font-size:10px;color:#6a82aa;letter-spacing:.16em;text-transform:uppercase;margin-left:8px;vertical-align:middle}
#nav{display:flex;gap:4px}
.nav-btn{background:transparent;border:1px solid transparent;border-radius:8px;padding:6px 14px;color:#a8bcde;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.nav-btn:hover{color:#f0f3fc}
.nav-btn.on{background:#28304a;border-color:#3d5080;color:#f0f3fc}
#main{padding:0 40px 80px;max-width:960px;margin:0 auto}

#search-wrap{text-align:center;padding-top:80px;padding-bottom:28px;transition:padding-top .4s}
#search-wrap.compact{padding-top:44px}
#hero{margin-bottom:32px}
#hero h1{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:500;color:#f0f3fc;letter-spacing:-1.5px;margin-bottom:8px;line-height:1.1}
#hero p{color:#a8bcde;font-size:14px;font-weight:300}
#search-row{display:flex;max-width:540px;margin:0 auto}
#q{flex:1;padding:14px 20px;background:#212840;border:1px solid #3d5080;border-right:none;border-radius:10px 0 0 10px;color:#f0f3fc;font-size:14px;outline:none;font-family:'Outfit',sans-serif;transition:border-color .2s}
#q:focus{border-color:rgba(201,165,90,.4)}
#q::placeholder{color:#6a82aa}
#go-btn{padding:0 24px;min-width:108px;background:#c9a55a;border:none;border-radius:0 10px 10px 0;color:#1a1200;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;display:flex;align-items:center;justify-content:center;transition:filter .2s}
#go-btn:hover:not(:disabled){filter:brightness(1.1)}
#go-btn:disabled{opacity:.75;cursor:wait}
#err{color:#d95f5f;font-size:13px;margin-top:10px}

.disam-card{background:#212840;border:1px solid #3d5080;border-radius:14px;padding:18px 20px;max-width:520px;margin:0 auto}
.disam-card p{font-size:13px;color:#a8bcde;margin-bottom:12px}
.db{width:100%;background:#28304a;border:1px solid #3d5080;border-radius:10px;padding:12px 16px;text-align:left;cursor:pointer;font-family:'Outfit',sans-serif;color:#f0f3fc;margin-bottom:7px;transition:all .18s}
.db:hover{border-color:rgba(201,165,90,.4);background:#303856}
.db .dl{font-size:13px;font-weight:500;color:#c9a55a;margin-bottom:3px}
.db .dd{font-size:12px;color:#a8bcde}

.cp-bridge{display:flex;justify-content:center;margin:8px 0}
.cp-bridge div{width:1px;height:26px;background:linear-gradient(#c9a55a60,#3d5080)}
.cp-box{background:#212840;border:1px solid #3d5080;border-radius:16px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.cp-head{padding:20px 28px 0;border-bottom:1px solid #3d5080;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.cp-head h2{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:#c9a55a;letter-spacing:-.5px;margin-bottom:10px;line-height:1.1}
.tabs{display:flex}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 18px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;color:#a8bcde;letter-spacing:.02em;transition:all .2s}
.tab:hover{color:#f0f3fc}
.tab.on{color:#c9a55a;border-bottom-color:#c9a55a}
.add-btn{background:rgba(201,165,90,.08);border:1px solid rgba(201,165,90,.25);border-radius:8px;padding:7px 14px;color:#c9a55a;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;margin-bottom:13px;white-space:nowrap}
.add-btn:hover{background:rgba(201,165,90,.15);border-color:rgba(201,165,90,.45)}
.add-btn.added{background:rgba(73,188,130,.08);border-color:rgba(73,188,130,.3);color:#49bc82;cursor:default}
.cp-body{padding:24px 28px;min-height:260px}

/* definition + illustration */
.def-text{font-size:16px;line-height:1.8;color:#f0f3fc;max-width:640px}
#def-image-area{margin-top:20px}
.gen-img-btn{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid #3d5080;border-radius:8px;padding:8px 16px;color:#a8bcde;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.gen-img-btn:hover:not(:disabled){border-color:rgba(201,165,90,.35);color:#c9a55a}
.gen-img-btn:disabled{opacity:.6;cursor:wait}
.illus-wrap{background:#28304a;border:1px solid #3d5080;border-radius:12px;overflow:hidden;margin-top:12px}
.illus-wrap svg{display:block;width:100%}
.illus-label{font-size:10px;color:#a8bcde;text-transform:uppercase;letter-spacing:.1em;padding:10px 14px 6px}
.img-loading{display:flex;align-items:center;gap:10px;color:#a8bcde;font-size:13px;padding:10px 0}

/* examples */
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-item{display:flex;gap:14px;padding:13px 16px;background:#28304a;border-radius:10px;border:1px solid #3d5080}
.ex-num{font-family:'Cormorant Garamond',serif;font-size:20px;color:#c9a55a;font-weight:600;min-width:18px;line-height:1.4}
.ex-text{font-size:14px;line-height:1.7;color:#f0f3fc}

/* mind map */
#mm-outer{position:relative}
#mm-hint{font-size:11px;color:#a8bcde;margin-bottom:8px}
#mm-wrap{background:#28304a;border-radius:12px;border:1px solid #3d5080;overflow:hidden}
#mm-svg{display:block;width:100%;cursor:grab}
#mm-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-line{width:16px;height:2px;border-radius:1px;opacity:.7}
.leg-label{font-size:10px;color:#a8bcde}

/* explore prompt tooltip */
#explore-prompt{display:none;position:absolute;z-index:200;background:#212840;border:1px solid rgba(201,165,90,.35);border-radius:12px;padding:14px 16px;box-shadow:0 16px 48px rgba(0,0,0,.6);width:260px;animation:popIn .2s cubic-bezier(.16,1,.3,1) both}
.ep-go{width:100%;background:#c9a55a;border:none;border-radius:8px;padding:9px 12px;color:#1a1200;font-size:12px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;text-align:center;display:block}
.ep-go:hover{filter:brightness(1.1)}
/* relationship popup */
#rel-popup{display:none;position:absolute;z-index:200;background:#212840;border:1px solid #3d5080;border-radius:12px;padding:14px 16px;box-shadow:0 16px 48px rgba(0,0,0,.7);width:240px;animation:popIn .2s cubic-bezier(.16,1,.3,1) both}

/* flashcards */
#fc-outer{max-width:640px;margin:0 auto;padding-top:44px}
#fc-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
#fc-count{font-size:12px;color:#a8bcde}
#fc-dots{display:flex;gap:5px}
.fc-dot{width:26px;height:3px;border-radius:2px;background:#3d5080;transition:background .3s}
.fc-dot.on{background:#c9a55a}
#fc-card{background:#212840;border:1px solid #3d5080;border-radius:18px;min-height:320px;padding:32px 36px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.4)}
#fc-badge{position:absolute;top:14px;right:16px;background:#28304a;border:1px solid #3d5080;border-radius:20px;padding:3px 10px;font-size:10px;color:#a8bcde;letter-spacing:.08em;text-transform:uppercase}
.fc-concept{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:256px;gap:10px}
.fc-concept h2{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:600;color:#c9a55a;text-align:center;letter-spacing:-1px;line-height:1.1}
.fc-concept p{color:#a8bcde;font-size:12px;font-style:italic}
.sec-label{font-size:10px;color:#a8bcde;margin-bottom:18px;text-transform:uppercase;letter-spacing:.12em}
#fc-actions{margin-top:18px;display:flex;justify-content:center}
.fc-next{background:#28304a;border:1px solid #3d5080;border-radius:10px;padding:12px 32px;color:#f0f3fc;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.fc-next:hover{border-color:#2a3a60;background:#303856}
.r-btn{flex:1;padding:11px 4px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;border:1px solid;transition:all .15s}
.r-btn:hover{transform:translateY(-2px);filter:brightness(1.15)}
.conn-chips{display:flex;flex-wrap:wrap;gap:8px}
.conn-chip{background:#28304a;border:1px solid #3d5080;border-radius:8px;padding:7px 11px;display:flex;align-items:center;gap:6px}
.ct{font-size:13px;color:#f0f3fc;font-weight:500}
.cr{font-size:11px;color:#a8bcde}
.empty-state{text-align:center;padding-top:80px}
.ei{font-family:'Cormorant Garamond',serif;font-size:48px;color:#6a82aa;margin-bottom:12px}
.eh{font-family:'Cormorant Garamond',serif;font-size:26px;color:#a8bcde;font-weight:400;margin-bottom:8px}
.ep2{color:#a8bcde;font-size:14px}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:9px;max-width:680px;margin:0 auto}
.deck-card{background:#212840;border:1px solid #3d5080;border-radius:10px;padding:12px 14px}
.deck-card.due{border-color:rgba(201,165,90,.4)}
.deck-name{font-family:'Cormorant Garamond',serif;font-size:17px;color:#f0f3fc;margin-bottom:3px}
.deck-name.due{color:#c9a55a}
.deck-meta{font-size:11px;color:#a8bcde}
.spinner{width:15px;height:15px;border:2px solid rgba(26,18,0,.3);border-top-color:#1a1200;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.sm-spinner{width:13px;height:13px;border:1.5px solid #6a82aa;border-top-color:#a8bcde;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}

/* Cultural Literacy Carousel */
#cl-section{max-width:600px;margin:36px auto 0;text-align:center}
#cl-label{font-size:10px;color:#6a82aa;text-transform:uppercase;letter-spacing:.16em;margin-bottom:14px}
#cl-label span{color:#c9a55a}
#cl-viewport{position:relative;overflow:hidden;height:72px;border-radius:12px;background:#1c2438;border:1px solid #3d5080;margin-bottom:12px}
#cl-track{display:flex;align-items:center;height:72px;will-change:transform}
.cl-item{flex-shrink:0;width:200px;height:56px;display:flex;align-items:center;justify-content:center;padding:0 12px;border-radius:8px;transition:background .2s}
.cl-item span{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:#a8bcde;text-align:center;line-height:1.2;pointer-events:none}
#cl-viewport::before,#cl-viewport::after{content:'';position:absolute;top:0;width:80px;height:100%;z-index:2;pointer-events:none}
#cl-viewport::before{left:0;background:linear-gradient(to right,#1c2438,transparent)}
#cl-viewport::after{right:0;background:linear-gradient(to left,#1c2438,transparent)}
#cl-center-line{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:60px;border:1px solid rgba(201,165,90,.35);border-radius:10px;pointer-events:none;z-index:1}
#cl-btns{display:flex;gap:10px;justify-content:center;align-items:center}
#cl-spin{background:#c9a55a;border:none;border-radius:9px;padding:10px 28px;color:#1a1200;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:filter .2s;letter-spacing:.02em}
#cl-spin:hover:not(:disabled){filter:brightness(1.1)}
#cl-spin:disabled{opacity:.6;cursor:wait}
#cl-explore{background:transparent;border:1px solid rgba(201,165,90,.4);border-radius:9px;padding:10px 22px;color:#c9a55a;font-size:13px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s;display:none}
#cl-explore:hover{background:rgba(201,165,90,.08);border-color:#c9a55a}

#mm-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2a3a60;border:1px solid #3d5080;border-radius:8px;padding:9px 18px;color:#a8bcde;font-size:12px;font-family:'Outfit',sans-serif;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999}
#mm-toast.show{opacity:1}
</style>
</head>
<body>
<div id="header">
  <span id="logo">Episteme<span>Knowledge Explorer</span></span>
  <nav id="nav">
    <button class="nav-btn on" id="btn-explore" onclick="showMode('search')">Explore</button>
    <button class="nav-btn" id="btn-review" onclick="showMode('review')">Review</button>
  </nav>
</div>
<div id="mm-toast"></div>
<div id="main">
  <div id="search-mode"></div>
  <div id="review-mode" style="display:none"></div>
</div>

// ── SM-2 ──────────────────────────────────────────────────────────────
function sm2(sr,q){
  var n=(sr&&sr.n)||0,ef=(sr&&sr.ef)||2.5,i=(sr&&sr.i)||1;
  if(q>=3){if(n===0)i=1;else if(n===1)i=6;else i=Math.round(i*ef);n++;}
  else{n=0;i=1;}
  ef=Math.max(1.3,ef+0.1-(5-q)*(0.08+(5-q)*0.02));
  return{n:n,ef:ef,i:i,due:Date.now()+i*86400000};
}

async function callClaude(userMsg,system){
  var r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:system,messages:[{role:'user',content:userMsg}]})
  });
  var d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return(d.content&&d.content[0]&&d.content[0].text)||'';
}

function parseJ(t){
  try{return JSON.parse(t);}catch(e){}
  var m=t.match(/```(?:json)?\s*([\s\S]*?)\s*```/);
  if(m)try{return JSON.parse(m[1]);}catch(e){}
  var s=t.search(/[{[]/);
  if(s>=0){var e2=t.lastIndexOf(t[s]==='['?']':'}');if(e2>s)try{return JSON.parse(t.slice(s,e2+1));}catch(ee){}}
  return null;
}

function relColor(rel){
  var r=(rel||'').toLowerCase();
  if(r.indexOf('type')>=0||r.indexOf('example')>=0||r.indexOf('instance')>=0)return'#a78bfa';
  if(r.indexOf('oppos')>=0||r.indexOf('contrast')>=0)return'#f87171';
  if(r.indexOf('component')>=0||r.indexOf('part')>=0)return'#60a5fa';
  if(r.indexOf('lead')>=0||r.indexOf('prereq')>=0||r.indexOf('cause')>=0)return'#fbbf24';
  return'#34d399';
}
function radial(n,r){
  return Array.from({length:n},function(_,i){
    return{x:Math.cos(-Math.PI/2+2*Math.PI*i/n)*r,y:Math.sin(-Math.PI/2+2*Math.PI*i/n)*r};
  });
}
function fanPos(px,py,n,r){
  if(!n)return[];
  var a=Math.atan2(py,px),sp=Math.min(Math.PI*.9,Math.max(.5,n*.4));
  return Array.from({length:n},function(_,i){
    var t=n===1?.5:i/(n-1),ang=a-sp/2+t*sp;
    return{x:px+Math.cos(ang)*r,y:py+Math.sin(ang)*r};
  });
}

function initMM(root,conns){
  var pos=radial(conns.length,200);
  mmNodes=[{id:root,label:root,x:0,y:0,isRoot:true}].concat(conns.map(function(c,i){
    return{id:c.concept,label:c.concept,x:pos[i].x,y:pos[i].y,depth:1};
  }));
  mmEdges=conns.map(function(c){return{from:root,to:c.concept,label:c.relationship};});
  mmExpanded=new Set([root]);
  mmPan={x:0,y:0};mmZoom=1;mmLoading=null;
  drawMM();
}

async function expandMM(node){
  if(mmExpanded.has(node.id)||mmLoading)return;
  mmLoading=node.id;drawMM();
  try{
    var raw=await callClaude('Concept: "'+node.id+'"',
      'Give exactly 4 connected concepts with relationship types. Respond ONLY with a JSON array, nothing else: [{"concept":"short concept name","relationship":"relationship type"}]. Relationship types to use: "is a type of","contrasts with","is a component of","leads to","is a prerequisite for","is an application of","is related to". Keep concept names to 1-3 words. Pure JSON array only, no markdown, no explanation.');
    var cs=parseJ(raw);
    if(!Array.isArray(cs)||!cs.length)throw new Error('bad response');
    var exist=new Set(mmNodes.map(function(n){return n.id;}));
    var fresh=cs.filter(function(c){return c.concept&&!exist.has(c.concept);}).slice(0,4);
    if(fresh.length){
      var pos=fanPos(node.x,node.y,fresh.length,190);
      fresh.forEach(function(c,i){mmNodes.push({id:c.concept,label:c.concept,x:pos[i].x,y:pos[i].y,depth:(node.depth||1)+1});});
      fresh.forEach(function(c){mmEdges.push({from:node.id,to:c.concept,label:c.relationship});});
    }
    mmExpanded.add(node.id);
  }catch(err){
    console.error('expandMM error:',err);
    mmLoading=null;
    showToast('Could not expand — try again');
    drawMM();
    return;
  }
  mmLoading=null;drawMM();
}

function collapseNode(id){
  // recursively collect all descendant node ids
  function descendants(nid){
    var children=mmEdges.filter(function(e){return e.from===nid;}).map(function(e){return e.to;});
    var all=[];
    children.forEach(function(cid){all.push(cid);all=all.concat(descendants(cid));});
    return all;
  }
  var toRemove=new Set(descendants(id));
  mmNodes=mmNodes.filter(function(n){return!toRemove.has(n.id);});
  mmEdges=mmEdges.filter(function(e){return!toRemove.has(e.to)&&!toRemove.has(e.from);});
  mmExpanded.delete(id);
  toRemove.forEach(function(rid){mmExpanded.delete(rid);});
  drawMM();
}

  return (-vw/2-mmPan.x)+' '+(-vh/2-mmPan.y)+' '+vw+' '+vh;
}

function drawMM(){
  var wrap=document.getElementById('mm-content');
  if(!wrap)return;
  var W=820,H=460;

  // build lookup tables so inline onclick can reference by index
  window._mmNodes=mmNodes;
  window._mmEdges=mmEdges;

  var svg='<defs><pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r=".7" fill="#3a4f70" opacity=".5"/></pattern></defs>'
         +'<rect x="-2500" y="-2500" width="5000" height="5000" fill="url(#dots)"/>';

  // edges
  mmEdges.forEach(function(e,ei){
    var f=mmNodes.find(function(n){return n.id===e.from;}),t=mmNodes.find(function(n){return n.id===e.to;});
    if(!f||!t)return;
    var mx=(f.x+t.x)/2,my=(f.y+t.y)/2,col=relColor(e.label);
    svg+='<line x1="'+f.x+'" y1="'+f.y+'" x2="'+t.x+'" y2="'+t.y+'" stroke="'+col+'" stroke-width="1" opacity=".3"/>'

  s.addEventListener('mousedown',function(e){
    mmDragStart={x:e.clientX,y:e.clientY,px:mmPan.x,py:mmPan.y};
  });
  s.addEventListener('mousemove',function(e){
    if(!mmDragStart)return;
    var dx=e.clientX-mmDragStart.x,dy=e.clientY-mmDragStart.y;
    if(!mmDrag&&Math.sqrt(dx*dx+dy*dy)<5)return;
    mmDrag=true;
    mmPan={x:mmDragStart.px+dx,y:mmDragStart.py+dy};
    applyVB();s.style.cursor='grabbing';
  });
  s.addEventListener('mouseup',function(){mmDrag=false;mmDragStart=null;s.style.cursor='grab';});
  s.addEventListener('mouseleave',function(){mmDrag=false;mmDragStart=null;});
  s.addEventListener('wheel',function(e){
    e.preventDefault();
    var rect=s.getBoundingClientRect();
    var mx=e.clientX-rect.left,my=e.clientY-rect.top;
    var oldZ=mmZoom,delta=e.deltaY>0?-0.12:0.12;
    mmZoom=Math.min(4,Math.max(0.25,mmZoom+delta));
    mmPan.x+=W*(mx/rect.width-0.5)*(1/mmZoom-1/oldZ);
    mmPan.y+=H*(my/rect.height-0.5)*(1/mmZoom-1/oldZ);
    applyVB();
  },{passive:false});
}

var clCurrent=null, clSpinning=false;
var ITEM_W=200;

function clBuild(){
  var track=document.getElementById('cl-track');
  if(!track)return;
  // build a long shuffled strip (repeat terms for seamless feel)
  var pool=CL_TERMS.slice().sort(function(){return Math.random()-.5;});
  track.innerHTML='';
  // place 40 items
  for(var i=0;i<40;i++){
    var t=pool[i%pool.length];
    var div=document.createElement('div');
    div.className='cl-item';
    div.innerHTML='<span>'+t+'</span>';
    track.appendChild(div);
  }
  // start centred on item 10
  track.style.transform='translateX(-'+(10*ITEM_W - (300-ITEM_W/2))+'px)';
  clCurrent=pool[10];
}

function clSpin(){
  if(clSpinning)return;
  var track=document.getElementById('cl-track');
  var exploreBtn=document.getElementById('cl-explore');
  var spinBtn=document.getElementById('cl-spin');
  if(!track)return;
  clSpinning=true;
  if(exploreBtn)exploreBtn.style.display='none';
  if(spinBtn)spinBtn.disabled=true;

  // rebuild with fresh shuffle each spin
  var pool=CL_TERMS.slice().sort(function(){return Math.random()-.5;});
  track.innerHTML='';
  for(var i=0;i<60;i++){
    var t=pool[i%pool.length];
    var div=document.createElement('div');
    div.className='cl-item';
    div.innerHTML='<span>'+t+'</span>';
    track.appendChild(div);
  }

  // land on item between 20-30
  var landIdx=20+Math.floor(Math.random()*10);
  clCurrent=pool[landIdx%pool.length];

  var vw=300; // viewport visual center offset
  var targetX=landIdx*ITEM_W-(vw-ITEM_W/2);

  // animate with cubic ease-out
  var start=null;
  var startX=5*ITEM_W-(vw-ITEM_W/2);
  track.style.transform='translateX(-'+startX+'px)';
  var duration=5000;

  function easeOut(t){return 1-Math.pow(1-t,4);}

  function step(ts){
    if(!start)start=ts;
    var elapsed=ts-start;
    var progress=Math.min(elapsed/duration,1);
    var eased=easeOut(progress);
    var current=startX+(targetX-startX)*eased;
    track.style.transform='translateX(-'+current+'px)';
    if(progress<1){
      requestAnimationFrame(step);
    } else {
      // landed
      clSpinning=false;
      if(spinBtn)spinBtn.disabled=false;
      if(exploreBtn){exploreBtn.style.display='inline-block';}
      // highlight centre item
      var items=track.querySelectorAll('.cl-item');
      items.forEach(function(el,i){
        el.style.background=i===landIdx?'rgba(201,165,90,.1)':'';
        var sp=el.querySelector('span');
        if(sp)sp.style.color=i===landIdx?'#c9a55a':'#a8bcde';
      });
    }
  }
  requestAnimationFrame(step);
}

async function doSearch(){
  var term=(document.getElementById('q').value||'').trim();
  if(!term)return;
  var btn=document.getElementById('go-btn');
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  document.getElementById('err').textContent='';
  document.getElementById('disam-area').innerHTML='';
  document.getElementById('concept-area').innerHTML='';
  currentConcept=null;
  // hide carousel and disclaimer while showing results
  var cls=document.getElementById('cl-section');if(cls)cls.style.display='none';
  var dis=document.getElementById('disclaimer');if(dis)dis.style.display='none';
  try{
    var raw=await callClaude('Concept: "'+term+'"',
      'You are a knowledge assistant. If significantly ambiguous (2+ very different meanings), respond ONLY with: {"ambiguous":true,"meanings":[{"label":"meaning name","description":"one sentence"}]}. Otherwise: {"ambiguous":false,"definition":"1-2 sentence clear definition","examples":["concrete example 1","concrete example 2","concrete example 3"],"connections":[{"concept":"1-3 word concept","relationship":"relationship type"}]}. Include 5-7 connections. Relationship types: "is a type of","contrasts with","is a component of","is a prerequisite for","is an application of","is an example of","influenced by","leads to","is the opposite of". No markdown, pure JSON only.');
    var json=parseJ(raw);
    if(!json)throw new Error('parse error');
    if(json.ambiguous){
      var daEl=document.getElementById('disam-area');
      var card=document.createElement('div');
      card.className='disam-card fu';
      var intro=document.createElement('p');
      intro.innerHTML='"<span style="color:#f0f3fc">'+term+'</span>" has multiple meanings — which do you mean?';
      card.appendChild(intro);
      (json.meanings||[]).forEach(function(m){
        var btn=document.createElement('button');
        btn.className='db';
        btn.innerHTML='<div class="dl">'+(m.label||'')+'</div><div class="dd">'+(m.description||'')+'</div>';
        btn.addEventListener('click',function(){
          document.getElementById('q').value=term+' ('+(m.label||'')+')';
          daEl.innerHTML='';
          doSearch();
        });
        card.appendChild(btn);
      });
      daEl.innerHTML='';
      daEl.appendChild(card);
    } else {
      currentConcept={term:term,definition:json.definition,examples:json.examples,connections:json.connections};
      currentTab='definition';
      document.getElementById('search-wrap').classList.add('compact');
      var hero=document.getElementById('hero');if(hero)hero.remove();
      renderConcept();
    }
  }catch(e){document.getElementById('err').textContent='Something went wrong — please try again.';console.error(e);}
  btn.disabled=false;btn.textContent='Explore →';
}

  } else {
    actHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">'
      +'<p style="font-size:12px;color:#a8bcde">How well did you recall this?</p>'
      +'<div style="display:flex;gap:6px;width:100%">'
      +[{q:0,l:'Forgot',c:'#d95f5f'},{q:2,l:'Hard',c:'#d4825a'},{q:3,l:'Okay',c:'#5e6e90'},{q:4,l:'Good',c:'#4d8ef5'},{q:5,l:'Easy',c:'#49bc82'}]
        .map(function(x){return'<button class="r-btn" style="background:'+x.c+'18;border-color:'+x.c+'45;color:'+x.c+'" onclick="fcRate('+x.q+')">'+x.l+'</button>';}).join('')
      +'</div></div>';
  }
  document.getElementById('review-mode').innerHTML='<div id="fc-outer">'
    +'<div id="fc-progress"><span id="fc-count">Card '+(fcIdx+1)+' of '+fcSession.length+'</span>'
    +'<div id="fc-dots">'+sides.map(function(_,i){return'<div class="fc-dot'+(i<=fcSide?' on':'')+'"></div>';}).join('')+'</div></div>'
    +'<div id="fc-card"><div id="fc-badge">'+sides[fcSide]+'</div><div class="fi">'+faceHTML+'</div></div>'
    +'<div id="fc-actions">'+actHTML+'</div>'
    +'<div style="text-align:center;margin-top:24px"><button onclick="renderManageDeck()" style="background:none;border:none;color:#6a82aa;font-size:12px;cursor:pointer;font-family:Outfit,sans-serif;text-decoration:underline;text-underline-offset:3px">Manage deck</button></div>'
    +'</div>';
}

function fcNext(){fcSide++;renderFC();}
function fcRate(q){
  var card=fcSession[fcIdx];
  var sr=sm2(card.sr,q);
  var idx=cards.findIndex(function(c){return c.id===card.id;});
  if(idx>=0){cards[idx].sr=sr;saveCards();}
  fcIdx++;fcSide=0;
  if(fcIdx>=fcSession.length)renderDone();else renderFC();
}

function deckGrid(){
  return'<div class="deck-grid">'+cards.map(function(card){
    var due=!card.sr||!card.sr.due||Date.now()>=card.sr.due;
    return'<div class="deck-card'+(due?' due':'')+'" style="position:relative"><div class="deck-name'+(due?' due':'')+'">'+card.term+'</div>'
      +'<div class="deck-meta">'+(due?'● Due now':'Next: '+new Date(card.sr.due).toLocaleDateString('en-GB',{day:'numeric',month:'short'}))+(card.sr&&card.sr.i?' · '+card.sr.i+'d interval':'')+'</div>'
      +'<button onclick="deleteCard(\''+card.id+'\')" title="Remove from deck" style="position:absolute;top:7px;right:7px;background:none;border:none;color:#3d5080;font-size:15px;cursor:pointer;line-height:1;padding:1px 4px;border-radius:4px;transition:color .15s" onmouseover="this.style.color=\'#d95f5f\'" onmouseout="this.style.color=\'#3d5080\'">×</button>'
      +'</div>';
  }).join('')+'</div>';
}

function renderManageDeck(){
  var el=document.getElementById('review-mode');
  var due=cards.filter(function(c){return!c.sr||!c.sr.due||Date.now()>=c.sr.due;}).length;
  el.innerHTML='<div style="padding-top:36px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;max-width:680px;margin:0 auto 16px;">'
    +'<div style="font-size:11px;color:#a8bcde;text-transform:uppercase;letter-spacing:.12em">Your deck · '+cards.length+' concept'+(cards.length!==1?'s':'')+'</div>'
    +(due>0?'<button onclick="renderReview()" style="background:#c9a55a;border:none;border-radius:8px;padding:7px 16px;color:#1a1200;font-size:12px;font-weight:600;cursor:pointer;font-family:Outfit,sans-serif">Review '+due+' due →</button>':'')
    +'</div>'
    +deckGrid()
    +'</div>';
}

function renderDone(){
  var el=document.getElementById('review-mode');
  el.innerHTML='<div style="padding-top:48px">'
    +'<div style="text-align:center;margin-bottom:40px">'
    +'<div style="font-family:\'Cormorant Garamond\',serif;font-size:48px;color:#c9a55a;margin-bottom:10px">✦</div>'
    +'<h2 style="font-family:\'Cormorant Garamond\',serif;font-size:30px;font-weight:500;color:#f0f3fc;margin-bottom:6px">All caught up!</h2>'
    +'<p style="color:#a8bcde;font-size:14px">Come back tomorrow for your next session.</p></div>'
    +'<div style="font-size:11px;color:#a8bcde;margin-bottom:14px;text-transform:uppercase;letter-spacing:.12em;max-width:680px;margin-left:auto;margin-right:auto">Your deck · '+cards.length+' concept'+(cards.length!==1?'s':'')+'</div>'
    +deckGrid()+'</div>';
}

function deleteCard(id){
  cards=cards.filter(function(c){return c.id!==id;});
  saveCards();updateNavBadge();renderDone();
}

// ── Nav ───────────────────────────────────────────────────────────────
function updateNavBadge(){
  var due=cards.filter(function(c){return!c.sr||!c.sr.due||Date.now()>=c.sr.due;}).length;
  document.getElementById('btn-review').textContent='Review'+(due>0?' · '+due:'');
}
function showMode(m){
  currentMode=m;
  document.getElementById('search-mode').style.display=m==='search'?'block':'none';
  document.getElementById('review-mode').style.display=m==='review'?'block':'none';
  document.getElementById('btn-explore').classList.toggle('on',m==='search');
  document.getElementById('btn-review').classList.toggle('on',m==='review');
  updateNavBadge();
  if(m==='search')renderSearch();
  if(m==='review')renderReview();
}

// ── Init ──────────────────────────────────────────────────────────────
(async function(){
  await loadCards();
  renderSearch();
  updateNavBadge();
})();
</script>
</body>
</html>
