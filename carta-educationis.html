<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta Educationis</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:        #06090f;
  --ocean:     #0c1e30;
  --gold:      #c8a84b;
  --gold-hi:   #e8cc7a;
  --gold-glow: rgba(200,168,75,0.4);
  --parch-d:   #a8946a;
  --text:      #cbbf98;
  --card-bg:   rgba(5,8,15,0.97);
  --border:    rgba(200,168,75,0.2);
  --border-b:  rgba(200,168,75,0.55);
}
html,body { width:100%;height:100%;overflow:hidden;background:var(--bg); }
#app { width:100vw;height:100vh;position:relative;display:flex;flex-direction:column; }
#map-wrap { flex:1;position:relative;overflow:hidden; }
#map { width:100%;height:100%;cursor:grab; }
#map:active { cursor:grabbing; }
#app::after {
  content:'';position:absolute;inset:0;pointer-events:none;z-index:50;opacity:.45;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  background-size:200px;
}
.sphere   { fill:var(--ocean); }
.gratline { fill:none;stroke:rgba(200,168,75,0.04);stroke-width:0.5; }
.land     { stroke:rgba(200,168,75,0.12);stroke-width:0.5;cursor:pointer;transition:filter .12s,stroke .12s; }
.land:hover { stroke:var(--gold);stroke-width:1.2;filter:brightness(1.7) saturate(1.3); }
#header { position:absolute;top:20px;left:50%;transform:translateX(-50%);text-align:center;z-index:20;pointer-events:none; }
#header h1 { font-family:'Cinzel Decorative',serif;font-size:1.15rem;color:var(--gold);letter-spacing:.38em;text-shadow:0 0 40px var(--gold-glow),0 0 80px rgba(200,168,75,.12); }
#header p  { font-family:'EB Garamond',serif;font-style:italic;font-size:.75rem;color:var(--parch-d);letter-spacing:.18em;margin-top:4px; }
.corner { position:absolute;width:44px;height:44px;pointer-events:none;z-index:18;opacity:.5; }
.tl{top:10px;left:10px} .tr{top:10px;right:10px;transform:scaleX(-1)}
#tip { position:absolute;pointer-events:none;z-index:35;white-space:nowrap;background:rgba(5,8,15,.93);border:1px solid var(--border-b);padding:4px 12px;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.12em;color:var(--gold);opacity:0;transition:opacity .12s; }
#hint { position:absolute;bottom:112px;left:50%;transform:translateX(-50%);font-family:'EB Garamond',serif;font-style:italic;font-size:.7rem;color:rgba(168,148,96,.35);letter-spacing:.15em;pointer-events:none;z-index:8;transition:opacity 1s; }
#compass { position:absolute;bottom:116px;left:22px;width:60px;height:60px;opacity:.16;pointer-events:none;z-index:10; }
#fade { position:absolute;inset:0;background:var(--bg);opacity:0;pointer-events:none;z-index:5;transition:opacity .25s; }
#fade.on { opacity:.4; }
#map-load { position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:40;transition:opacity .6s; }
#map-load.gone { opacity:0;pointer-events:none; }
.load-title { font-family:'Cinzel Decorative',serif;font-size:1rem;color:var(--gold);letter-spacing:.35em;text-shadow:0 0 30px var(--gold-glow); }
.load-sub   { font-family:'EB Garamond',serif;font-style:italic;font-size:.78rem;color:var(--parch-d);letter-spacing:.18em;margin-top:8px;text-align:center; }
.load-bar   { width:160px;height:1px;background:rgba(200,168,75,.12);margin:16px auto 0;overflow:hidden; }
.load-bar-fill { height:100%;background:var(--gold);animation:lb 1.8s ease-in-out infinite; }
@keyframes lb { 0%{width:0%;margin-left:0%}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%} }

/* EDU CARD */
#edu-card { position:absolute;top:64px;right:16px;width:310px;background:var(--card-bg);border:1px solid var(--border);z-index:25;opacity:0;transform:translateX(12px);transition:opacity .28s,transform .28s;pointer-events:none;backdrop-filter:blur(18px);max-height:calc(100vh - 185px);display:flex;flex-direction:column;overflow:hidden; }
#edu-card::before { content:'';display:block;height:2px;background:linear-gradient(to right,transparent,var(--gold),transparent); }
#edu-card.show { opacity:1;transform:translateX(0);pointer-events:auto; }
.card-head { padding:13px 16px;background:linear-gradient(135deg,rgba(200,168,75,.1),rgba(200,168,75,.02));border-bottom:1px solid var(--border);position:relative; }
.card-region { font-family:'Cinzel',serif;font-size:.88rem;font-weight:600;color:var(--gold);line-height:1.25;padding-right:20px; }
.card-period { font-family:'EB Garamond',serif;font-style:italic;font-size:.78rem;color:var(--parch-d);margin-top:3px; }
#card-close  { position:absolute;top:9px;right:12px;background:none;border:none;color:var(--gold);font-size:.85rem;cursor:pointer;opacity:.45;transition:opacity .18s; }
#card-close:hover { opacity:1; }
.card-body { overflow-y:auto;flex:1; }
.card-body::-webkit-scrollbar { width:2px; }
.card-body::-webkit-scrollbar-thumb { background:rgba(200,168,75,.22);border-radius:2px; }
.cf { padding:10px 16px;border-bottom:1px solid rgba(200,168,75,.055); }
.cf:last-child { border-bottom:none; }
.cf-lbl { font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.22em;color:var(--gold);opacity:.7;text-transform:uppercase;margin-bottom:4px; }
.cf-val { font-family:'EB Garamond',serif;font-size:.865rem;color:var(--text);line-height:1.55; }
.card-loading { padding:28px 16px;text-align:center;font-family:'EB Garamond',serif;font-style:italic;font-size:.85rem;color:var(--parch-d); }
.dots::after { content:'';animation:dt 1.4s steps(4,end) infinite; }
@keyframes dt { 0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''} }
.ctabs { display:flex;border-top:1px solid var(--border);border-bottom:1px solid rgba(200,168,75,.06); }
.ctab  { flex:1;padding:7px 4px;font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;background:none;border:none;color:var(--parch-d);cursor:pointer;transition:all .18s; }
.ctab.on { color:var(--gold);background:rgba(200,168,75,.07); }
.ccontent { padding:10px 16px;font-family:'EB Garamond',serif;font-size:.865rem;color:var(--text);line-height:1.55;border-bottom:1px solid rgba(200,168,75,.055); }

/* TIMELINE */
#timeline { height:100px;z-index:20;position:relative;background:linear-gradient(to top,rgba(4,6,12,.98) 0%,rgba(4,6,12,.78) 70%,transparent 100%);border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:0 72px 14px; }
#era-name    { font-family:'EB Garamond',serif;font-style:italic;font-size:.66rem;color:rgba(168,148,96,.45);letter-spacing:.16em;pointer-events:none; }
#year-display{ font-family:'Cinzel',serif;font-size:1.6rem;font-weight:600;color:var(--gold);letter-spacing:.1em;text-shadow:0 0 28px var(--gold-glow);min-width:175px;text-align:center;line-height:1; }
#scrub-wrap  { width:100%;max-width:860px;position:relative;height:32px;display:flex;align-items:center; }
#era-bands   { position:absolute;left:0;right:0;height:5px;top:50%;transform:translateY(-50%);border-radius:3px;overflow:hidden;display:flex; }
.era-seg     { height:100%; }
#track       { position:absolute;left:0;right:0;height:2px;background:rgba(200,168,75,.1);top:50%;transform:translateY(-50%); }
#track-fill  { height:100%;background:linear-gradient(to right,#6e500d,var(--gold));width:0%; }
#thumb { position:absolute;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--gold-hi),var(--gold));top:50%;transform:translate(-50%,-50%);left:0%;cursor:ew-resize;box-shadow:0 0 12px var(--gold-glow),0 0 24px rgba(200,168,75,.15);z-index:3; }
#thumb::after { content:'';position:absolute;inset:5px;background:var(--bg);border-radius:50%; }
#thumb:hover,#thumb.drag { box-shadow:0 0 18px var(--gold-glow),0 0 36px rgba(200,168,75,.3); }
#era-lbls  { position:absolute;bottom:-17px;left:0;right:0;display:flex;justify-content:space-between; }
.era-lbl   { font-family:'EB Garamond',serif;font-size:.56rem;color:rgba(168,148,96,.38);letter-spacing:.08em; }
</style>
</head>
<body>
<div id="app">

  <div id="map-wrap">
    <svg id="map"></svg>
    <div id="map-load"><div style="text-align:center">
      <div class="load-title">CARTA EDUCATIONIS</div>
      <div class="load-sub">Charting the ancient world…</div>
      <div class="load-bar"><div class="load-bar-fill"></div></div>
    </div></div>
    <div id="fade"></div>
    <div id="tip"></div>
  </div>

  <div id="header">
    <h1>CARTA EDUCATIONIS</h1>
    <p>A History of Human Learning · 2000 BC — Present</p>
  </div>

  <div class="corner tl"><svg viewBox="0 0 44 44" fill="none"><path d="M2 2L18 2L18 4L4 4L4 18L2 18Z" fill="#c8a84b"/><path d="M2 2L9 9" stroke="#c8a84b" stroke-width="0.6"/><circle cx="2" cy="2" r="1.5" fill="#c8a84b"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 44 44" fill="none"><path d="M2 2L18 2L18 4L4 4L4 18L2 18Z" fill="#c8a84b"/><path d="M2 2L9 9" stroke="#c8a84b" stroke-width="0.6"/><circle cx="2" cy="2" r="1.5" fill="#c8a84b"/></svg></div>

  <svg id="compass" viewBox="0 0 64 64" fill="none">
    <circle cx="32" cy="32" r="29" stroke="#c8a84b" stroke-width="0.6"/>
    <circle cx="32" cy="32" r="21" stroke="#c8a84b" stroke-width="0.4"/>
    <path d="M32 5L34 29L32 32L30 29Z" fill="#c8a84b"/>
    <path d="M32 59L34 35L32 32L30 35Z" fill="#c8a84b" opacity=".45"/>
    <path d="M5 32L29 30L32 32L29 34Z" fill="#c8a84b" opacity=".45"/>
    <path d="M59 32L35 30L32 32L35 34Z" fill="#c8a84b" opacity=".45"/>
    <circle cx="32" cy="32" r="2.8" fill="#c8a84b"/>
    <text x="32" y="13" text-anchor="middle" font-family="Cinzel,serif" font-size="6" fill="#c8a84b">N</text>
  </svg>

  <div id="hint">click a region to explore its educational history</div>

  <div id="edu-card">
    <button id="card-close" onclick="closeCard()">✕</button>
    <div class="card-head">
      <div class="card-region" id="card-region">—</div>
      <div class="card-period" id="card-period">—</div>
    </div>
    <div class="card-body" id="card-body"></div>
  </div>

  <div id="timeline">
    <div id="era-name">Bronze Age Civilisations</div>
    <div id="year-display">2000 BC</div>
    <div id="scrub-wrap">
      <div id="era-bands"></div>
      <div id="track"><div id="track-fill"></div></div>
      <div id="thumb"></div>
      <div id="era-lbls">
        <span class="era-lbl">2000 BC</span>
        <span class="era-lbl">1000 BC</span>
        <span class="era-lbl">500 BC</span>
        <span class="era-lbl">1 AD</span>
        <span class="era-lbl">1000</span>
        <span class="era-lbl">1500</span>
        <span class="era-lbl">1800</span>
        <span class="era-lbl">Today</span>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ISO numeric id → name for world-atlas fallback
const ISO = {"4":"Afghanistan","8":"Albania","12":"Algeria","24":"Angola","32":"Argentina","36":"Australia","40":"Austria","50":"Bangladesh","56":"Belgium","64":"Bhutan","68":"Bolivia","76":"Brazil","100":"Bulgaria","116":"Cambodia","120":"Cameroon","124":"Canada","144":"Sri Lanka","152":"Chile","156":"China","170":"Colombia","180":"DR Congo","188":"Costa Rica","192":"Cuba","208":"Denmark","218":"Ecuador","818":"Egypt","231":"Ethiopia","246":"Finland","250":"France","276":"Germany","288":"Ghana","300":"Greece","320":"Guatemala","332":"Haiti","340":"Honduras","356":"India","360":"Indonesia","364":"Iran","368":"Iraq","372":"Ireland","376":"Israel","380":"Italy","392":"Japan","400":"Jordan","404":"Kenya","408":"North Korea","410":"South Korea","414":"Kuwait","418":"Laos","422":"Lebanon","434":"Libya","484":"Mexico","504":"Morocco","508":"Mozambique","524":"Nepal","528":"Netherlands","558":"Nicaragua","566":"Nigeria","578":"Norway","586":"Pakistan","604":"Peru","608":"Philippines","616":"Poland","620":"Portugal","642":"Romania","643":"Russia","682":"Saudi Arabia","706":"Somalia","710":"South Africa","724":"Spain","729":"Sudan","752":"Sweden","756":"Switzerland","760":"Syria","764":"Thailand","792":"Turkey","800":"Uganda","804":"Ukraine","826":"United Kingdom","840":"United States","858":"Uruguay","862":"Venezuela","704":"Vietnam","887":"Yemen","716":"Zimbabwe","450":"Madagascar","466":"Mali","478":"Mauritania","562":"Niger","454":"Malawi","516":"Namibia","646":"Rwanda","694":"Sierra Leone","748":"Eswatini","768":"Togo","788":"Tunisia","854":"Burkina Faso","108":"Burundi","140":"Central African Republic","148":"Chad","178":"Republic of Congo","384":"Ivory Coast","232":"Eritrea","242":"Fiji","598":"Papua New Guinea","196":"Cyprus","203":"Czech Republic","703":"Slovakia","705":"Slovenia","191":"Croatia","70":"Bosnia and Herzegovina","807":"North Macedonia","499":"Montenegro","688":"Serbia","440":"Lithuania","428":"Latvia","233":"Estonia","348":"Hungary","498":"Moldova","112":"Belarus","268":"Georgia","031":"Azerbaijan","051":"Armenia","398":"Kazakhstan","417":"Kyrgyzstan","762":"Tajikistan","795":"Turkmenistan","860":"Uzbekistan","496":"Mongolia","462":"Maldives","686":"Senegal","222":"El Salvador","270":"Gambia","324":"Guinea","624":"Guinea-Bissau","426":"Lesotho","430":"Liberia","204":"Benin","72":"Botswana","174":"Comoros","262":"Djibouti","266":"Gabon","388":"Jamaica","480":"Mauritius","591":"Panama","630":"Puerto Rico","784":"United Arab Emirates","776":"Tonga","882":"Samoa"};

const MIN_YR=-2000, MAX_YR=2024, RANGE=MAX_YR-MIN_YR;
const HIST_YRS=[-2000,-1000,-500,1,200,400,600,800,1000,1100,1200,1279,1300,1400,1492,1500,1530,1600,1650,1700,1715,1783,1800,1815,1880,1914,1920,1938,1945,1960,1994,2000];
const ERAS=[
  {s:-2000,e:-800,  c:'rgba(180,115,35,0.55)',n:'Bronze Age Civilisations'},
  {s:-800, e:-100,  c:'rgba(160,45,45,0.52)', n:'Iron Age & Classical Antiquity'},
  {s:-100, e:500,   c:'rgba(140,50,30,0.48)', n:'Roman Era & Late Antiquity'},
  {s:500,  e:1100,  c:'rgba(45,65,125,0.52)', n:'Early Medieval'},
  {s:1100, e:1500,  c:'rgba(55,80,145,0.52)', n:'High & Late Medieval'},
  {s:1500, e:1700,  c:'rgba(45,105,75,0.52)', n:'Renaissance & Reformation'},
  {s:1700, e:1850,  c:'rgba(55,95,65,0.50)',  n:'Enlightenment & Revolution'},
  {s:1850, e:1950,  c:'rgba(75,65,130,0.52)', n:'Industrial & Modern Age'},
  {s:1950, e:2025,  c:'rgba(35,95,105,0.52)', n:'Contemporary'},
];
const PAL=['hsl(18,30%,26%)','hsl(32,26%,24%)','hsl(198,28%,22%)','hsl(212,32%,24%)','hsl(248,22%,26%)','hsl(158,24%,22%)','hsl(278,20%,26%)','hsl(352,26%,26%)','hsl(44,24%,24%)','hsl(168,24%,23%)','hsl(308,19%,25%)','hsl(98,20%,23%)','hsl(228,26%,28%)','hsl(62,20%,24%)','hsl(188,26%,24%)'];

let curYear=MIN_YR, lastMapYear=null;
let geoCache={}, eduCache={}, colorCache={};
let dragging=false, loadTimer=null, colData=null;

// ── API KEY ──────────────────────────────────────────────────────────────────
// Paste your Anthropic API key here when you have one:
const apiKey = '';

// ── UTILS ────────────────────────────────────────────────────────────────────
function yrLabel(yr) { return yr<=0?`${Math.abs(yr)||1} BC`:`${yr} AD`; }
function nearestYr(yr){ return HIST_YRS.reduce((p,c)=>Math.abs(c-yr)<Math.abs(p-yr)?c:p); }
function getEra(yr)  { return (ERAS.find(e=>yr>=e.s&&yr<e.e)||ERAS[ERAS.length-1]).n; }
function hue(name) {
  if(!name) return 'hsl(220,16%,22%)';
  if(colorCache[name]) return colorCache[name];
  let h=5381; for(let i=0;i<name.length;i++) h=((h<<5)+h)+name.charCodeAt(i);
  return colorCache[name]=PAL[Math.abs(h)%PAL.length];
}
function getName(d) {
  const p=d.properties||{};
  if(p.NAME) return p.NAME;
  if(p.name) return p.name;
  if(p.ADMIN) return p.ADMIN;
  if(p.admin) return p.admin;
  if(p.NAME_LONG) return p.NAME_LONG;
  const id=String(d.id||p.id||'');
  return (id&&ISO[id])?ISO[id]:'Unknown Region';
}

// ── D3 MAP ───────────────────────────────────────────────────────────────────
const W=window.innerWidth, H=window.innerHeight-100;
const svg=d3.select('#map').attr('width',W).attr('height',H).attr('viewBox',`0 0 ${W} ${H}`);
const proj=d3.geoNaturalEarth1().scale(W/6.3).translate([W/2,H/2]);
const gPath=d3.geoPath().projection(proj);
const gRoot=svg.append('g');
gRoot.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',gPath);
gRoot.append('path').datum(d3.geoGraticule()()).attr('class','gratline').attr('d',gPath);
const gLand=gRoot.append('g');
const zoom=d3.zoom().scaleExtent([1,14]).on('zoom',evt=>{
  gRoot.attr('transform',evt.transform);
  gLand.selectAll('.land').attr('stroke-width',0.5/evt.transform.k);
});
svg.call(zoom);

// ── GEO FETCH ────────────────────────────────────────────────────────────────
async function loadFallback() {
  if(geoCache.__fb) return geoCache.__fb;
  const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  const t=await r.json();
  return geoCache.__fb=topojson.feature(t,t.objects.countries);
}
async function fetchGeo(yr) {
  const ny=nearestYr(yr);
  if(geoCache[ny]) return geoCache[ny];
  for(const url of [
    `https://cdn.jsdelivr.net/gh/aourednik/historical-basemaps@master/geojson/world_${ny}.geojson`,
    `https://raw.githubusercontent.com/aourednik/historical-basemaps/master/geojson/world_${ny}.geojson`
  ]) {
    try {
      const r=await fetch(url); if(!r.ok) continue;
      const d=await r.json();
      if(d?.features?.length>0) return geoCache[ny]=d;
    } catch(e) {}
  }
  return geoCache.__fb||null;
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function renderGeo(geo) {
  if(!geo?.features) return;
  gLand.selectAll('.land').remove();
  gLand.selectAll('.land').data(geo.features).enter()
    .append('path').attr('class','land').attr('d',gPath)
    .style('fill',d=>hue(getName(d))).style('opacity',0)
    .on('mouseover',onHover).on('mousemove',onMove).on('mouseout',onOut).on('click',onClick)
    .transition().duration(650).ease(d3.easeCubicInOut).style('opacity',1);
}

// ── INTERACTION ──────────────────────────────────────────────────────────────
const tip=document.getElementById('tip');
function onHover(evt,d) {
  const n=getName(d); if(n==='Unknown Region') return;
  tip.textContent=n; tip.style.opacity='1';
}
function onMove(evt) {
  const [x,y]=d3.pointer(evt,document.getElementById('app'));
  tip.style.left=(x+16)+'px'; tip.style.top=(y-8)+'px';
}
function onOut() { tip.style.opacity='0'; }
function onClick(evt,d) {
  evt.stopPropagation();
  const n=getName(d); if(n!=='Unknown Region') showCard(n,curYear);
}
svg.on('click',()=>closeCard());

// ── EDU CARD ─────────────────────────────────────────────────────────────────
const card=document.getElementById('edu-card');
const cRegion=document.getElementById('card-region');
const cPeriod=document.getElementById('card-period');
const cBody=document.getElementById('card-body');

function showCard(name,yr) {
  const label=yrLabel(yr), key=`${name}||${nearestYr(yr)}`;
  cRegion.textContent=name; cPeriod.textContent=label;
  cBody.innerHTML='<div class="card-loading"><span class="dots">Consulting the archives</span></div>';
  card.classList.add('show');
  if(eduCache[key]) { renderCard(eduCache[key]); return; }
  callAPI(name,yr,label,key);
}

// ── OFFLINE DATASET ───────────────────────────────────────────────────────────
// Each entry: regions (name fragments to match), yearMin, yearMax, data object.
const OFFLINE = [
  // ── EGYPT ──
  { r:['egypt','kemet'], y:[-2000,-500], d:{ region:'Ancient Egypt', period:'New Kingdom & Third Intermediate Period', access:'Scribal schools (Houses of Instruction) admitted boys of elite families; girls and commoners largely excluded. Royal and priestly sons had the most privileged access.', curriculum:'Hieroglyphic writing, mathematics, religious texts, medical knowledge, and administrative record-keeping. Copying of canonical texts such as the Book of the Dead and Kemyt was central.', institutions:'Per-ankh (Houses of Life) attached to temples; the scribal school at Deir el-Medina served artisans of the royal necropolis. The sage Amenemope composed influential wisdom texts.', literacy:'Estimated 1–3% of the population were literate. Perhaps a few thousand active scribes supported the state apparatus at any given time.' }},

function lookupOffline(name,yr) {
  const n = name.toLowerCase();
  // Score each entry by name match + year proximity
  let best = null, bestScore = -1;
  for (const e of OFFLINE) {
    const nameMatch = e.r.some(r => n.includes(r) || r.includes(n.split(' ')[0]));
    if (!nameMatch) continue;
    const [yMin,yMax] = e.y;
    const inRange = yr>=yMin && yr<=yMax;
    const dist = inRange ? 0 : Math.min(Math.abs(yr-yMin), Math.abs(yr-yMax));
    const score = (inRange ? 1000 : 0) - dist;
    if (score > bestScore) { bestScore = score; best = e; }
  }
  return best ? best.d : null;
}

async function callAPI(name,yr,label,cacheKey) {
  // Try offline dataset first
  const offline = lookupOffline(name, yr);
  if (offline) {
    const edu = { ...offline };
    if (!edu.region) edu.region = name;
    if (!edu.period) edu.period = label;
    if (edu.region) cRegion.textContent = edu.region;
    if (edu.period) cPeriod.textContent = edu.period;
    eduCache[cacheKey] = edu;
    renderCard(edu);
    return;
  }
  // Fall back to secure backend — sends only region+year, key never exposed
  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ region: name, year: label })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const raw = data.content?.find(b => b.type === 'text')?.text
      ?.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim() || '{}';
    const edu = JSON.parse(raw);
    if (edu.region) cRegion.textContent = edu.region;
    if (edu.period) cPeriod.textContent = edu.period;
    eduCache[cacheKey] = edu; renderCard(edu);
    return;
  } catch(e) { console.error(e); }
  // Nothing matched
  cBody.innerHTML=`<div class="cf"><div class="cf-val" style="font-style:italic;opacity:.55;font-family:'EB Garamond',serif;">
    No records in the archive for this region at this time. Try a major civilisation or a different era.
  </div></div>`;
}

function renderCard(edu) {
  let h=field('Who Had Access',edu.access)+field('What Was Taught',edu.curriculum)+field('Key Institutions',edu.institutions)+field('Literacy & Enrolment',edu.literacy);
  if(edu.isColonial&&edu.indigenous&&edu.colonial) {
    colData={indigenous:edu.indigenous,colonial:edu.colonial};
    h+=`<div class="ctabs"><button class="ctab on" id="ctab-i" onclick="switchTab('indigenous')">Indigenous</button><button class="ctab" id="ctab-c" onclick="switchTab('colonial')">Colonial</button></div><div class="ccontent" id="ccont">${edu.indigenous}</div>`;
  }
  cBody.innerHTML=h;
}
function field(l,v) { return `<div class="cf"><div class="cf-lbl">${l}</div><div class="cf-val">${v||'—'}</div></div>`; }
window.switchTab=function(w) {
  if(!colData) return;
  document.getElementById('ctab-i').classList.toggle('on',w==='indigenous');
  document.getElementById('ctab-c').classList.toggle('on',w==='colonial');
  document.getElementById('ccont').textContent=colData[w];
};
window.closeCard=function() { card.classList.remove('show'); };

// ── TIMELINE ─────────────────────────────────────────────────────────────────
const thumb=document.getElementById('thumb');
const trackFill=document.getElementById('track-fill');
const yearDisp=document.getElementById('year-display');
const eraBandsEl=document.getElementById('era-bands');
const eraNameEl=document.getElementById('era-name');
const scrubWrap=document.getElementById('scrub-wrap');

ERAS.forEach(er=>{
  const s=document.createElement('div');
  s.className='era-seg'; s.style.cssText=`width:${(er.e-er.s)/RANGE*100}%;background:${er.c}`;
  eraBandsEl.appendChild(s);
});
function fracToYr(f){ return Math.round(MIN_YR+Math.max(0,Math.min(1,f))*RANGE); }
function setThumb(f) {
  f=Math.max(0,Math.min(1,f));
  thumb.style.left=(f*100)+'%'; trackFill.style.width=(f*100)+'%';
  curYear=fracToYr(f); yearDisp.textContent=yrLabel(curYear); eraNameEl.textContent=getEra(curYear);
}
function scrubFrac(e){ const r=scrubWrap.getBoundingClientRect(); return ((e.clientX||0)-r.left)/r.width; }
setThumb(0);
thumb.addEventListener('mousedown',e=>{ dragging=true; thumb.classList.add('drag'); e.preventDefault(); });
document.addEventListener('mousemove',e=>{ if(!dragging) return; setThumb(scrubFrac(e)); clearTimeout(loadTimer); loadTimer=setTimeout(()=>loadYear(curYear),300); });
document.addEventListener('mouseup',()=>{ if(!dragging) return; dragging=false; thumb.classList.remove('drag'); loadYear(curYear); });
scrubWrap.addEventListener('click',e=>{ if(e.target===thumb) return; setThumb(scrubFrac(e)); loadYear(curYear); });

// ── YEAR LOAD ────────────────────────────────────────────────────────────────
const fadeEl=document.getElementById('fade');
async function loadYear(yr) {
  const ny=nearestYr(yr); if(ny===lastMapYear) return;
  lastMapYear=ny; fadeEl.classList.add('on');
  renderGeo(await fetchGeo(yr));
  setTimeout(()=>fadeEl.classList.remove('on'),80);
}

// ── START ────────────────────────────────────────────────────────────────────
async function startApp() {
  const ov=document.getElementById('map-load');
  try { renderGeo(await loadFallback()); } catch(e) {}
  ov.classList.add('gone'); setTimeout(()=>ov.remove(),700);
  const geo=await fetchGeo(MIN_YR);
  if(geo&&geo!==geoCache.__fb) renderGeo(geo);
  lastMapYear=nearestYr(MIN_YR);
  const hint=document.getElementById('hint');
  setTimeout(()=>{ hint.style.opacity='0'; setTimeout(()=>hint?.remove(),1000); },7000);
}

// ── AUTO START ───────────────────────────────────────────────────────────────
startApp();

window.addEventListener('resize',()=>{
  const nW=window.innerWidth,nH=window.innerHeight-100;
  svg.attr('width',nW).attr('height',nH).attr('viewBox',`0 0 ${nW} ${nH}`);
  proj.scale(nW/6.3).translate([nW/2,nH/2]);
  gRoot.select('.sphere').attr('d',gPath);
  gRoot.select('.gratline').attr('d',gPath);
  gLand.selectAll('.land').attr('d',gPath);
});
</script>
</body>
